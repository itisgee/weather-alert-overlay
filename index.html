<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial,sans-serif;
}

#loader{
position:fixed;
top:0;
left:0;
font-size:1px;
color:rgba(255,255,255,0.01);
}

#alert{
display:block;
position:fixed;
top:30px;
left:30px;
background:rgba(160,0,180,.96);
color:white;
padding:6px 16px;
border-radius:16px;
font-size:26px;
font-weight:900;
animation:pulse .8s infinite;
}

@keyframes pulse{
0%{transform:scale(1);box-shadow:0 0 8px rgba(255,0,0,.4);}
50%{transform:scale(1.02);box-shadow:0 0 28px rgba(255,0,0,.95);}
100%{transform:scale(1);box-shadow:0 0 8px rgba(255,0,0,.4);}
}
</style>
</head>

<body>
<div id="loader">.</div>

<div id="alert">
<span id="msg">TORNADO EMERGENCY</span>
</div>

</body>
</html>
