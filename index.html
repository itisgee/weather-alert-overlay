<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Alert Overlay</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent !important;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#alert {
  display: none;
  position: fixed;
  top: 30px;
  left: 30px;
  background: rgba(180, 0, 0, 0.92);
  color: white;
  padding: 16px 24px;
  border-radius: 16px;
  font-size: 30px;
  font-weight: 900;
  box-shadow: 0 4px 18px rgba(0,0,0,0.35);
}

.small {
  display: block;
  font-size: 18px;
  font-weight: 700;
  margin-top: 4px;
}
</style>
</head>

<body>

<div id="alert">
  🚨 <span id="alertText">TORNADO WARNING ISSUED</span>
  <span class="small">WeatherHolidays Live Chase Alert</span>
</div>

<script>
async function checkWarning() {
  try {
    const response = await fetch("https://storm-warning-bot.onrender.com/status.json?cache=" + Date.now());
    const data = await response.json();

    const alertBox = document.getElementById("alert");
    const alertText = document.getElementById("alertText");

    if (data.state === "warning") {
      alertText.textContent = data.text || "TORNADO WARNING ISSUED";
      alertBox.style.display = "block";
    } else {
      alertBox.style.display = "none";
    }
  } catch (error) {
    console.log("Warning check failed", error);
  }
}

checkWarning();
setInterval(checkWarning, 5000);
</script>

</body>
</html>
