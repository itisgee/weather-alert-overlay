<script>
async function checkWarning(){
  try{
    const response = await fetch(
      "https://storm-warning-bot.onrender.com/status.json",
      {cache:"no-store"}
    );

    const data = await response.json();

    // TEMP TEST MODE - change these two lines to test different alerts
    data.state = "tornado_emergency";
    data.text = "TORNADO EMERGENCY";

    const alertBox = document.getElementById("alert");
    const msg = document.getElementById("msg");

    if(data.state==="tornado_emergency"){
      alertBox.style.display="block";
      alertBox.style.background="rgba(160,0,180,.96)";
      alertBox.style.color="white";
      alertBox.style.animation="pulse 0.8s infinite";
      msg.innerText=data.text;
    }

    else if(data.state==="pds_tornado"){
      alertBox.style.display="block";
      alertBox.style.background="rgba(110,0,0,.96)";
      alertBox.style.color="white";
      alertBox.style.animation="pulse 1.0s infinite";
      msg.innerText=data.text;
    }

    else if(data.state==="tornado"){
      alertBox.style.display="block";
      alertBox.style.background="rgba(180,0,0,.95)";
      alertBox.style.color="white";
      alertBox.style.animation="pulse 1.4s infinite";
      msg.innerText=data.text;
    }

    else if(data.state==="severe"){
      alertBox.style.display="block";
      alertBox.style.background="rgba(255,200,0,.95)";
      alertBox.style.color="black";
      alertBox.style.animation="none";
      msg.innerText=data.text;
    }

    else{
      alertBox.style.display="none";
    }

  }catch(e){
    console.log("Warning check failed", e);
  }
}

checkWarning();
setInterval(checkWarning,5000);
</script>
