<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial,sans-serif;
}

#loader{
position:fixed;
top:0;
left:0;
font-size:1px;
color:rgba(255,255,255,0.01);
}

#alert{
display:block;
position:fixed;
top:30px;
left:30px;
background:rgba(180,0,0,.95);
color:white;
padding:6px 16px;
border-radius:16px;
font-size:26px;
font-weight:900;
animation:pulse 1.4s infinite;
}

@keyframes pulse{
0%{
transform:scale(1);
box-shadow:0 0 8px rgba(255,0,0,.4);
}

50%{
transform:scale(1.02);
box-shadow:0 0 28px rgba(255,0,0,.95);
}

100%{
transform:scale(1);
box-shadow:0 0 8px rgba(255,0,0,.4);
}
}
</style>
</head>

<body>

<div id="loader">.</div>

<div id="alert">
<span id="msg">TORNADO WARNING ISSUED</span>
</div>

<script>
async function checkWarning(){
try{
const response = await fetch(
"https://storm-warning-bot.onrender.com/status.json",
{cache:"no-store"}
);

const data = await response.json();

const alertBox = document.getElementById("alert");
const msg = document.getElementById("msg");

if(data.state === "warning"){
msg.innerText = data.text || "TORNADO WARNING ISSUED";
alertBox.style.display = "block";
}else{
alertBox.style.display = "none";
}

}catch(e){
console.log("Warning check failed", e);
}
}

checkWarning();
setInterval(checkWarning,5000);
</script>

</body>
</html>
