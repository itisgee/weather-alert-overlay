<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial,sans-serif;
}

#alert{
display:none;
position:fixed;
top:30px;
left:30px;
background:rgba(180,0,0,.95);
color:white;
padding:6px 16px;
border-radius:16px;
font-size:26px;
font-weight:900;
animation:pulse 1.4s infinite;
}

@keyframes pulse{
0%{
transform:scale(1);
box-shadow:0 0 8px rgba(255,0,0,.4);
}

50%{
transform:scale(1.02);
box-shadow:0 0 28px rgba(255,0,0,.95);
}

100%{
transform:scale(1);
box-shadow:0 0 8px rgba(255,0,0,.4);
}
}

.small{
display:block;
font-size:18px;
margin-top:6px;
}
</style>
</head>

<body>

<div id="alert">
<span id="msg">TORNADO WARNING ISSUED</span>
</div>

<script>
async function checkWarning(){

try{
let response=await fetch(
"https://storm-warning-bot.onrender.com/status.json",
{cache:"no-store"}
);

let data=await response.json();

console.log(data); // debugging

if(data.state==="warning"){
document.getElementById("msg").innerText=data.text;
document.getElementById("alert").style.display="block";
}
else{
document.getElementById("alert").style.display="none";
}

}catch(e){

// TEMP fallback so we can see something while testing
document.getElementById("alert").style.display="block";
console.log(e);

}

}

checkWarning();
setInterval(checkWarning,5000);
</script>

</body>
</html>
